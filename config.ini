# =====================================================================
# Bluetooth Proximity Monitor — Configuration File
# =====================================================================
#
# This file controls how the proximity monitor behaves.
# After editing, restart the service:
#   sudo systemctl restart bt-proximity.service
#
# To find your phone's Bluetooth MAC address:
#   bluetoothctl devices
#   (Look for your phone's name in the output)
#
# =====================================================================

[proximity]
phone_mac = 
rssi_threshold = -6
check_interval = 5
away_count_trigger = 3
wake_check_interval = 30
log_level = INFO
